name: Build and publish Docker images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: docker/backend/Dockerfile
          target: production
          push: true
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/petadopt-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/petadopt-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: docker/frontend/Dockerfile
          target: production
          push: true
          load: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/petadopt-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/petadopt-frontend:latest

      - name: Inspect built image sizes
        run: |
          echo "Backend image size:"
          docker image inspect ghcr.io/${{ github.repository_owner }}/petadopt-backend:latest --format='{{.Size}}'
          echo "Frontend image size:"
          docker image inspect ghcr.io/${{ github.repository_owner }}/petadopt-frontend:latest --format='{{.Size}}'
