<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetAdopt - Encontre seu melhor amigo</title>
    <!-- Use Comic Relief from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'catalog/style.css' %}">
</head>
<body>
    <header class="glass-header">
        <a href="{% url 'catalog' %}" style="text-decoration: none;"><div class="logo">🐾 PetAdopt</div></a>
        <nav>
            <a href="{% url 'catalog' %}">Catálogo</a>
            {% if user.is_authenticated %}
                <a href="{% url 'custom_admin' %}">Administração</a>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-btn">Sair</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login Restrito</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 PetAdopt. Desenvolvido com Django & Padrões de Projeto.</p>
    </footer>
</body>
</html>
